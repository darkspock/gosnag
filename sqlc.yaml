version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/database/db"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
